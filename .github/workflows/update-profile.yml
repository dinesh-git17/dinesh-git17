name: Update Profile

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch SVG uptime
        run: python3 scripts/update_uptime.py

      - name: Bump stats cache-buster
        run: python3 scripts/update_stats_cache.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/neofetch.svg README.md
          if git diff --cached --quiet; then
            echo "No changes - skipping commit."
          else
            git commit -m "chore: refresh profile ($(date -u +'%Y-%m-%d'))"
            git push
          fi

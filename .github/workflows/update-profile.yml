name: Update Profile

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-dev

      - name: Refresh dashboard
        env:
          GH_USER_LOGIN: dinesh-git17
          READMEDASH_TOKEN: ${{ secrets.READMEDASH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: uv run python -m scripts.update_dashboard

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets/dashboard.svg; then
            echo "No changes - skipping commit."
          else
            stamp="$(date -u +'%Y%m%d%H%M')"
            perl -0pi -e "s#assets/dashboard\.svg(?:\?v=[0-9]+)?#assets/dashboard.svg?v=$stamp#g" README.md
            git add README.md assets/dashboard.svg
            git commit -m "chore: refresh dashboard ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          fi

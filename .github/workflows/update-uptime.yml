name: Update Uptime

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch SVG uptime
        run: python3 scripts/update_uptime.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/neofetch.svg
          if git diff --cached --quiet; then
            echo "No uptime change — skipping commit."
          else
            git commit -m "chore: update uptime to $(date +'%Y-%m')"
            git push
          fi

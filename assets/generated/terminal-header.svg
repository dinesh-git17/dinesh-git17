<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" role="img" aria-label="Dinesh Dawonauth — Staff Data Engineer · Full-Stack Builder">
  <title>Dinesh Dawonauth — Staff Data Engineer · Full-Stack Builder</title>
  <defs>
    <style>
      :root {
        --bg: #1C1A17;
        --fg: #F0EBE1;
        --fg-muted: #8C8479;
        --accent: #E8A838;
        --accent-dim: #A8762A;
      }

      .name {
        fill: var(--fg);
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 24px;
        font-weight: 700;
      }

      .title {
        fill: var(--fg-muted);
        font-family: 'Inter', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 14px;
        font-weight: 400;
      }

      .tagline {
        fill: var(--fg-muted);
        font-family: 'Inter', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 13px;
        font-weight: 400;
      }

      .pulse-line {
        fill: var(--accent);
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1.0; }
        50% { opacity: 0.6; }
      }

      @media (prefers-reduced-motion: reduce) {
        .pulse-line {
          animation: none;
          opacity: 1.0;
        }
      }
    </style>
  </defs>

  <!-- Name -->
  <text class="name" x="400" y="58" text-anchor="middle">Dinesh Dawonauth</text>

  <!-- Title -->
  <text class="title" x="400" y="82" text-anchor="middle">Staff Data Engineer · Full-Stack Builder</text>

  <!-- Tagline -->
  <text class="tagline" x="400" y="108" text-anchor="middle">Engineering data systems by day. Shipping side projects because the work doesn’t stop.</text>

  <!-- Amber Pulse Line -->
  <rect class="pulse-line" x="40" y="130" width="720" height="1" rx="0.5"/>
</svg>
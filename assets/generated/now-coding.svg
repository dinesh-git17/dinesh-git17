<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" role="img" aria-label="WakaTime coding statistics">
  <title>Coding Stats - Last 7 Days</title>
  <defs>
    <style>
      :root {
        --bg: #1C1A17;
        --surface: #252320;
        --border: #3A3630;
        --fg: #F0EBE1;
        --fg-muted: #8C8479;
        --accent: #E8A838;
        --accent-dim: #A8762A;
      }

      .card-bg {
        fill: var(--surface);
      }

      .card-border {
        fill: none;
        stroke: var(--border);
        stroke-width: 1;
      }

      .title {
        fill: var(--accent);
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 14px;
        font-weight: bold;
      }

      .label {
        fill: var(--fg);
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 12px;
      }

      .bar-bg {
        fill: var(--border);
      }

      .bar-fill-1 { fill: var(--accent); }
      .bar-fill-2 { fill: var(--accent-dim); }
      .bar-fill-3 { fill: var(--fg-muted); }

      .hours {
        fill: var(--fg-muted);
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 11px;
      }

      .total {
        fill: var(--accent);
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 16px;
        font-weight: bold;
      }

      .unavailable {
        fill: var(--fg-muted);
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        font-size: 12px;
        font-style: italic;
      }

      /* Bar animation */
      .bar-animated {
        animation: growBar 1s ease-out forwards;
        transform-origin: left;
        transform: scaleX(0);
      }

      @keyframes growBar {
        to { transform: scaleX(1); }
      }

      .bar-1 { animation-delay: 0.2s; }
      .bar-2 { animation-delay: 0.4s; }
      .bar-3 { animation-delay: 0.6s; }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .bar-animated {
          animation: none;
          transform: scaleX(1);
        }
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect class="card-bg" x="0" y="0" width="800" height="140" rx="8" ry="8"/>
  <rect class="card-border" x="0.5" y="0.5" width="799" height="139" rx="8" ry="8"/>

  <!-- Header -->
  <text class="title" x="20" y="28">// now coding</text>
  <text class="total" x="780" y="28" text-anchor="end">7.0h this week</text>

  <!-- Language Bars - Horizontal layout -->
  <g transform="translate(20, 50)">
    <g transform="translate(0, 0)">
      <text class="label" x="0" y="12">Markdown</text>
      <text class="hours" x="230" y="12" text-anchor="end">2.8h (40.6%)</text>
      <rect class="bar-bg" x="0" y="22" width="240" height="10" rx="5"/>
      <rect class="bar-fill-1 bar-animated bar-1" x="0" y="22" width="97.44000000000001" height="10" rx="5"/>
    </g>
    <g transform="translate(255, 0)">
      <text class="label" x="0" y="12">Other</text>
      <text class="hours" x="230" y="12" text-anchor="end">2.1h (30.4%)</text>
      <rect class="bar-bg" x="0" y="22" width="240" height="10" rx="5"/>
      <rect class="bar-fill-2 bar-animated bar-2" x="0" y="22" width="72.96" height="10" rx="5"/>
    </g>
    <g transform="translate(510, 0)">
      <text class="label" x="0" y="12">Swift</text>
      <text class="hours" x="230" y="12" text-anchor="end">1.1h (15.8%)</text>
      <rect class="bar-bg" x="0" y="22" width="240" height="10" rx="5"/>
      <rect class="bar-fill-3 bar-animated bar-3" x="0" y="22" width="37.92" height="10" rx="5"/>
    </g>
  </g>
</svg>
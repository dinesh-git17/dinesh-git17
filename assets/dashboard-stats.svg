<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 340">
  <rect x="0" y="0" width="1500" height="340" fill="#0A0E1A"/>

  <!-- ============ GITHUB AT A GLANCE ============ -->
  <g id="github-at-a-glance">
    <rect x="30" y="30" width="500" height="280" fill="#11151F" stroke="#1F2533" rx="8"/>
    <text x="60" y="62" font-family="monospace" font-size="14" font-weight="bold" fill="#9EFF5A">GITHUB AT A GLANCE</text>

    <text x="60" y="110" font-family="monospace" font-size="13" fill="#E8E8E0">Total Stars Earned</text>
    <text x="430" y="110" font-family="monospace" font-size="13" fill="#9EFF5A" text-anchor="end"><!-- STARS_START -->116<!-- STARS_END --></text>

    <text x="60" y="140" font-family="monospace" font-size="13" fill="#E8E8E0">Total Commits (last year)</text>
    <text x="430" y="140" font-family="monospace" font-size="13" fill="#9EFF5A" text-anchor="end"><!-- COMMITS_START -->3.8k<!-- COMMITS_END --></text>

    <text x="60" y="170" font-family="monospace" font-size="13" fill="#E8E8E0">Total PRs</text>
    <text x="430" y="170" font-family="monospace" font-size="13" fill="#9EFF5A" text-anchor="end"><!-- PRS_START -->818<!-- PRS_END --></text>

    <text x="60" y="200" font-family="monospace" font-size="13" fill="#E8E8E0">Total Issues</text>
    <text x="430" y="200" font-family="monospace" font-size="13" fill="#9EFF5A" text-anchor="end"><!-- ISSUES_START -->36<!-- ISSUES_END --></text>

    <text x="60" y="230" font-family="monospace" font-size="13" fill="#E8E8E0">Contributed to (last year)</text>
    <text x="430" y="230" font-family="monospace" font-size="13" fill="#9EFF5A" text-anchor="end"><!-- CONTRIB_TO_START -->3<!-- CONTRIB_TO_END --></text>

    <circle cx="475" cy="200" r="36" fill="none" stroke="#262C3A" stroke-width="6"/>
    <circle cx="475" cy="200" r="36" fill="none" stroke="#9EFF5A" stroke-width="6" stroke-dasharray="<!-- GRADE_RING_DASHARRAY_START -->180 226<!-- GRADE_RING_DASHARRAY_END -->" stroke-dashoffset="0" transform="rotate(-90 475 200)" stroke-linecap="round"/>
    <text x="475" y="208" font-family="monospace" font-size="24" font-weight="bold" fill="#E8E8E0" text-anchor="middle"><!-- GRADE_LETTER_START -->A<!-- GRADE_LETTER_END --></text>
    <text x="475" y="270" font-family="monospace" font-size="11" fill="#8B92A5" text-anchor="middle">Overall Grade</text>
  </g>

  <!-- ============ CONTRIBUTION OVERVIEW ============ -->
  <g id="contribution-overview">
    <rect x="555" y="30" width="500" height="280" fill="#11151F" stroke="#1F2533" rx="8"/>
    <text x="585" y="62" font-family="monospace" font-size="14" font-weight="bold" fill="#9EFF5A">CONTRIBUTION OVERVIEW</text>

    <!-- Total Contributions -->
    <text x="640" y="160" font-family="monospace" font-size="32" font-weight="bold" fill="#E8E8E0" text-anchor="middle"><!-- TOTAL_CONTRIB_START -->5,981<!-- TOTAL_CONTRIB_END --></text>
    <text x="640" y="190" font-family="monospace" font-size="11" fill="#9EFF5A" text-anchor="middle">Total Contributions</text>
    <text x="640" y="210" font-family="monospace" font-size="10" fill="#8B92A5" text-anchor="middle"><!-- TOTAL_CONTRIB_RANGE_START -->Jan 1, 2025 - Present<!-- TOTAL_CONTRIB_RANGE_END --></text>

    <!-- Current Streak with ring -->
    <circle cx="800" cy="155" r="44" fill="none" stroke="#262C3A" stroke-width="6"/>
    <circle cx="800" cy="155" r="44" fill="none" stroke="#9EFF5A" stroke-width="6" stroke-dasharray="<!-- STREAK_RING_DASHARRAY_START -->276 276<!-- STREAK_RING_DASHARRAY_END -->" stroke-dashoffset="0" transform="rotate(-90 800 155)" stroke-linecap="round"/>
    <text x="800" y="165" font-family="monospace" font-size="32" font-weight="bold" fill="#E8E8E0" text-anchor="middle"><!-- CURRENT_STREAK_START -->85<!-- CURRENT_STREAK_END --></text>
    <text x="800" y="220" font-family="monospace" font-size="11" fill="#9EFF5A" text-anchor="middle">Current Streak</text>
    <text x="800" y="240" font-family="monospace" font-size="10" fill="#8B92A5" text-anchor="middle"><!-- CURRENT_STREAK_RANGE_START -->Jan 31 - Apr 25<!-- CURRENT_STREAK_RANGE_END --></text>

    <!-- Longest Streak -->
    <text x="970" y="160" font-family="monospace" font-size="32" font-weight="bold" fill="#E8E8E0" text-anchor="middle"><!-- LONGEST_STREAK_START -->85<!-- LONGEST_STREAK_END --></text>
    <text x="970" y="190" font-family="monospace" font-size="11" fill="#9EFF5A" text-anchor="middle">Longest Streak</text>
    <text x="970" y="210" font-family="monospace" font-size="10" fill="#8B92A5" text-anchor="middle"><!-- LONGEST_STREAK_RANGE_START -->Jan 31 - Apr 25<!-- LONGEST_STREAK_RANGE_END --></text>
  </g>

  <!-- ============ TOP LANGUAGES ============ -->
  <g id="top-languages">
    <rect x="1080" y="30" width="390" height="280" fill="#11151F" stroke="#1F2533" rx="8"/>
    <text x="1110" y="62" font-family="monospace" font-size="14" font-weight="bold" fill="#9EFF5A">TOP LANGUAGES</text>
    <text x="1110" y="78" font-family="monospace" font-size="9" fill="#8B92A5">(BY HOURS)</text>

    <!-- Lang 1 -->
    <text x="1110" y="125" font-family="monospace" font-size="12" fill="#E8E8E0"><!-- LANG_1_NAME_START -->Python<!-- LANG_1_NAME_END --></text>
    <rect x="1180" y="115" width="<!-- LANG_1_BAR_WIDTH_START -->180<!-- LANG_1_BAR_WIDTH_END -->" height="12" fill="#9EFF5A" rx="2"/>
    <text x="1440" y="125" font-family="monospace" font-size="12" fill="#8B92A5" text-anchor="end"><!-- LANG_1_VALUE_START -->30 hrs<!-- LANG_1_VALUE_END --></text>

    <!-- Lang 2 -->
    <text x="1110" y="160" font-family="monospace" font-size="12" fill="#E8E8E0"><!-- LANG_2_NAME_START -->Other<!-- LANG_2_NAME_END --></text>
    <rect x="1180" y="150" width="<!-- LANG_2_BAR_WIDTH_START -->58<!-- LANG_2_BAR_WIDTH_END -->" height="12" fill="#6BBF3D" rx="2"/>
    <text x="1440" y="160" font-family="monospace" font-size="12" fill="#8B92A5" text-anchor="end"><!-- LANG_2_VALUE_START -->9 hrs 35 mins<!-- LANG_2_VALUE_END --></text>

    <!-- Lang 3 -->
    <text x="1110" y="195" font-family="monospace" font-size="12" fill="#E8E8E0"><!-- LANG_3_NAME_START -->JavaScript<!-- LANG_3_NAME_END --></text>
    <rect x="1180" y="185" width="<!-- LANG_3_BAR_WIDTH_START -->19<!-- LANG_3_BAR_WIDTH_END -->" height="12" fill="#6BBF3D" rx="2"/>
    <text x="1440" y="195" font-family="monospace" font-size="12" fill="#8B92A5" text-anchor="end"><!-- LANG_3_VALUE_START -->3 hrs 9 mins<!-- LANG_3_VALUE_END --></text>

    <!-- Lang 4 -->
    <text x="1110" y="230" font-family="monospace" font-size="12" fill="#E8E8E0"><!-- LANG_4_NAME_START -->YAML<!-- LANG_4_NAME_END --></text>
    <rect x="1180" y="220" width="<!-- LANG_4_BAR_WIDTH_START -->8<!-- LANG_4_BAR_WIDTH_END -->" height="12" fill="#6BBF3D" rx="2"/>
    <text x="1440" y="230" font-family="monospace" font-size="12" fill="#8B92A5" text-anchor="end"><!-- LANG_4_VALUE_START -->1 hr 25 mins<!-- LANG_4_VALUE_END --></text>

    <!-- Lang 5 -->
    <text x="1110" y="265" font-family="monospace" font-size="12" fill="#E8E8E0"><!-- LANG_5_NAME_START -->Bash<!-- LANG_5_NAME_END --></text>
    <rect x="1180" y="255" width="<!-- LANG_5_BAR_WIDTH_START -->8<!-- LANG_5_BAR_WIDTH_END -->" height="12" fill="#6BBF3D" rx="2"/>
    <text x="1440" y="265" font-family="monospace" font-size="12" fill="#8B92A5" text-anchor="end"><!-- LANG_5_VALUE_START -->1 hr 24 mins<!-- LANG_5_VALUE_END --></text>
  </g>
</svg>
